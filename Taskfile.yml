version: '3'

vars:
  GO_VERSION: '1.26'
  GOLANGCI_LINT_VERSION: 'v2.9.0'
  GCI_VERSION: 'v0.13.7'
  GOFUMPT_VERSION: 'v0.9.2'

  BIN_DIR: '{{.ROOT_DIR}}/bin'
  GOLANGCI_LINT: '{{.BIN_DIR}}/golangci-lint'
  GCI: '{{.BIN_DIR}}/gci'
  GOFUMPT: '{{.BIN_DIR}}/gofumpt'

tasks:
  install-formatters:
    desc: "Installs gci and gofumpt formatters in ./bin"
    cmds:
      - |
        [ -f {{.GOFUMPT}} ] || {
          echo '📦 Installing gofumpt {{.GOFUMPT_VERSION}}...'
          GOBIN={{.BIN_DIR}} go install mvdan.cc/gofumpt@{{.GOFUMPT_VERSION}}
        }
        [ -f {{.GCI}} ] || {
          echo '📦 Installing gci {{.GCI_VERSION}}...'
          GOBIN={{.BIN_DIR}} go install github.com/daixiang0/gci@{{.GCI_VERSION}}
        }
    status:
      - test -x {{.GOFUMPT}}
      - test -x {{.GCI}}

  format:
    desc: "Formats the entire project with gofumpt + gci"
    deps: [ install-formatters ]
    cmds:
      - |
        echo "🧼 Formatting with gofumpt ..."
        find . -type f -name '*.go' ! -path '*/mocks/*' -exec {{.GOFUMPT}} -extra -w {} +
      - |
        echo "🎯 Sorting imports with gci ..."
        find . -type f -name '*.go' ! -path '*/mocks/*' -exec {{.GCI}} write -s standard -s default -s "" {} +

  install-golangci-lint:
    desc: "Installs golangci-lint in the bin directory"
    cmds:
      - |
        [ -f {{.GOLANGCI_LINT}} ] || {
          mkdir -p {{.BIN_DIR}}
          echo "📦 Installing golangci-lint {{.GOLANGCI_LINT_VERSION}}..."
          GOBIN={{.BIN_DIR}} go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@{{.GOLANGCI_LINT_VERSION}}
        }
    status:
      - test -x {{.GOLANGCI_LINT}}

  lint:
    desc: "Runs golangci-lint for all modules"
    deps: [ install-golangci-lint ]
    cmds:
      - '{{.GOLANGCI_LINT}} run ./... --config=golangci.yml'

  docker-up:
    desc: "Starts all docker-compose.yml files from ./storage"
    cmds:
      - |
        find ./infra -type f -name '*docker-compose*.yml' | while read f; do
          echo "🚀 Starting $f ..."
          docker compose -f "$f" up -d
        done

  docker-down:
    desc: "Stops all docker-compose.yml files from ./storage"
    cmds:
      - |
        find ./infra -type f -name '*docker-compose*.yml' | while read f; do
          echo "🛑 Stopping $f ..."
          docker compose -f "$f" down
        done
  swagger-generate:
    desc: "Generates swagger files"
    cmds:
      - |
        swag init -g cmd/client/*.go -o ./docs/swagger
  sqlc-generate:
    desc: "Generate sqlc files"
    cmds:
      - |
        sqlc generate

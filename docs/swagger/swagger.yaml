      consumes:
      - application/json
      description: Login with username and password
      produces:
      - application/json
      responses: {}
      summary: User login page
      tags:
      - auth
    post:
      consumes:
      - application/json
      description: Login with username and password
      parameters:
      - description: login request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: User login
      tags:
      - auth

definitions:
  handler.CreateUserRequest:
    properties:
      confirm_password:
        type: string
      login:
        type: string
      name:
        type: string
      password:
        type: string
    type: object
  handler.CreateUserResponse:
    properties:
      id:
        type: integer
    type: object
  handler.ErrorResponse:
    properties:
      message:
        type: string
    type: object
  handler.ErrorResponseCreateUser:
    properties:
      message:
        type: string
    type: object
  handler.LoginRequest:
    properties:
      login:
        type: string
      password:
        type: string
    type: object
  handler.LoginResponse:
    properties:
      token:
        type: string
    type: object
info:
  contact: {}
paths:
  /user/create:
    post:
      consumes:
      - application/json
      description: CreateUser with username and password
      parameters:
      - description: login request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.CreateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.CreateUserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponseCreateUser'
      summary: User login create
      tags:
      - auth
  /user/login:

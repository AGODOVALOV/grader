definitions:
  dto.GraderPayloadCallback:
    properties:
      errorMessage:
        type: string
      errorText:
        type: string
      eventId:
        type: string
      passed:
        type: boolean
      reviewId:
        type: string
      taskId:
        type: string
      userId:
        type: string
    type: object
info:
  contact: {}
paths:
  /admin:
    get:
      consumes:
      - text/html
      description: Renders the admin panel with all user reviews
      produces:
      - text/html
      responses:
        "200":
          description: HTML page
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Admin panel page
      tags:
      - admin
  /admin/review/update:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Updates review status from the admin panel and refreshes the page
      parameters:
      - description: Review ID
        in: formData
        name: reviewID
        required: true
        type: integer
      - description: New review status
        in: formData
        name: status
        required: true
        type: string
      produces:
      - text/html
      responses:
        "303":
          description: See Other
          schema:
            type: string
        "400":
          description: Bad request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Update review status
      tags:
      - admin
  /api/v1/grader/callback:
    post:
      consumes:
      - application/json
      description: Callback from grader to process the review request with result
      parameters:
      - description: Grader callback payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/dto.GraderPayloadCallback'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
        "400":
          description: Invalid callback payload
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: Callback from grader
      tags:
      - callback
  /task/review:
    post:
      consumes:
      - multipart/form-data
      description: Uploads a file for a selected task and creates a new review request
      parameters:
      - description: Task number
        in: formData
        name: taskNumber
        required: true
        type: integer
      - description: Source file
        in: formData
        name: taskFile
        required: true
        type: file
      produces:
      - text/html
      responses:
        "303":
          description: See Other
          schema:
            type: string
        "400":
          description: Bad request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Submit a task for review
      tags:
      - task
  /user/account/{userID}:
    get:
      consumes:
      - text/html
      description: Renders the personal account page for the authenticated user
      parameters:
      - description: User ID
        in: path
        name: userID
        required: true
        type: integer
      produces:
      - text/html
      responses:
        "200":
          description: HTML page
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "404":
          description: Not found
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: User account page
      tags:
      - user
  /user/create:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Creates a new user account from submitted form data
      parameters:
      - description: Login
        in: formData
        name: login
        required: true
        type: string
      - description: Name
        in: formData
        name: name
        required: true
        type: string
      - description: Password
        in: formData
        name: password
        required: true
        type: string
      - description: Confirm password
        in: formData
        name: confirm_password
        required: true
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
        "500":
          description: Internal Server Error
      summary: Register a new user
      tags:
      - user
  /user/login:
    get:
      consumes:
      - text/html
      description: Renders the login form
      produces:
      - text/html
      responses:
        "200":
          description: HTML page
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Login page
      tags:
      - user
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Authenticates a user with login and password, sets access cookie,
        and redirects to the account page
      parameters:
      - description: Login
        in: formData
        name: login
        required: true
        type: string
      - description: Password
        in: formData
        name: password
        required: true
        type: string
      produces:
      - text/html
      responses:
        "303":
          description: See Other
          schema:
            type: string
        "400":
          description: Bad request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "404":
          description: Not found
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: User login
      tags:
      - user
  /user/register:
    get:
      consumes:
      - text/html
      description: Renders the user registration form
      produces:
      - text/html
      responses:
        "200":
          description: HTML page
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Registration page
      tags:
      - user
swagger: "2.0"

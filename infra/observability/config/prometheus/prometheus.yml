global:
  scrape_interval: 15s

scrape_configs:

  - job_name: "prometheus"
    static_configs:
      - targets: [ "localhost:9090" ]

  - job_name: "queue_processor_metrics"
    scrape_interval: 5s
    metrics_path: /metrics
    static_configs:
      - targets: [ "host.docker.internal:9091" ]

  - job_name: 'postgres_exporter'
    static_configs:
      - targets: [ 'postgres_exporter:9187' ]